<body>
  <header class="site-header">
    <a class="logo" href="/astrolabis/"><img class="logo-mark" src="/astrolabis/assets/logo-medallion.png" alt="" width="40" height="40"><span>Astrolabis</span></a>
    <nav class="site-nav" aria-label="Principale">
      <a href="/astrolabis/enquetes/">Les enquêtes</a>
      <a href="/astrolabis/cold-cases/">Cold cases</a>
      <a href="/astrolabis/resolutions/">Résolutions</a>
      <a href="/astrolabis/deposer/">Déposer</a>
    </nav>
    <form action="/astrolabis/recherche/" method="get" role="search">
      <input type="search" name="q" placeholder="Quelqu'un a déjà rencontré ça ?" aria-label="Rechercher une enquête">
    </form>
  </header>

  <main>
    <section class="wrap" style="padding-top:40px;">
  <h1 class="section-titre" style="margin-top:0;">Modération des hypothèses</h1>

  <div id="login-box">
    <p style="color:var(--texte-doux);">Connecte-toi pour valider les hypothèses déposées.</p>
    <form id="login-form" style="max-width:360px;">
      <label>Adresse e-mail<input type="email" name="email" required=""></label>
      <label>Mot de passe<input type="password" name="password" required=""></label>
      <button class="btn" type="submit">Se connecter</button>
      <p id="login-msg" class="hyp-msg" hidden=""></p>
    </form>
  </div>

  <div id="mod-box" hidden="">
    <p style="color:var(--texte-doux);">Connecté. <button id="logout" class="hyp-soutenir">Se déconnecter</button></p>
    <div id="mod-filtres" class="filtre-rangee">
      <button class="chip" data-f="pending" aria-pressed="true">En attente</button>
      <button class="chip" data-f="all" aria-pressed="false">Toutes</button>
    </div>
    <div id="mod-liste"><p class="hyp-vide">Chargement…</p></div>
  </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/astrolabis/assets/js/moderation.js"></script>
